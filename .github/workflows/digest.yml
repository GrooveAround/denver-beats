name: Digest generation

on:
  schedule:
    - cron: '0 19 * * 5'    # Friday noon MT — weekly digest
    - cron: '0 14 1 * *'    # 1st of month, 7am MT — monthly digest
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate weekly digest
        if: github.event.schedule == '0 19 * * 5' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python digest/generate_weekly.py

      - name: Commit digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/digests/
          git diff --staged --quiet || \
            git commit -m "chore: weekly digest $(date -u '+%Y-%m-%d')"
          git push