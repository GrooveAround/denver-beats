name: Build site check

on:
  push:
    paths:
      - 'data/events.json'
      - 'data/digests/**'
      - 'site/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build site
        run: cd site && npm run build
